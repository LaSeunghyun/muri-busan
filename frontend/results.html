<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무리없이 부산 — 추천 결과</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#003087">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="무리없이 부산">
</head>
<body>

<!-- Skip to content (WCAG 2AA) -->
<a href="#main-content" class="skip-to-content">본문 바로가기</a>

<!-- GNB: PC 전용 상단 네비게이션 -->
<nav class="gnb" aria-label="주 메뉴">
  <div class="gnb-inner">
    <a href="/" class="gnb-logo">♿ 무리없이 부산</a>
    <ul class="gnb-menu">
      <li><a href="/">홈</a></li>
      <li><a href="/onboarding.html" aria-current="page">코스 추천</a></li>
    </ul>
    <a href="/onboarding.html" class="btn-primary gnb-cta">코스 추천받기</a>
  </div>
</nav>

<div id="weatherBanner" style="display:none" class="weather-banner" role="status" aria-live="polite"></div>

<div class="page-wrapper" role="main" id="main-content">
  <!-- 모바일 헤더 -->
  <header class="app-header">
    <button class="back-btn" aria-label="뒤로 가기" onclick="navigateTo('/onboarding.html')">←</button>
    <h1>추천 코스</h1>
  </header>

  <!-- PC 결과 헤더 -->
  <div class="result-pc-header">
    <h2>맞춤 코스 추천 결과</h2>
  </div>

  <!-- 요약 -->
  <div class="result-summary" id="resultSummary">
    <div class="info">결과를 불러오는 중...</div>
  </div>

  <!-- Day 탭 (멀티데이일 때만 표시) -->
  <div class="result-day-bar" id="dayTabBar" style="display:none">
    <nav class="day-tabs" id="dayTabs" aria-label="일자별 보기"></nav>
  </div>

  <!-- 필터 탭 -->
  <div class="result-filter-bar">
    <nav class="filter-tabs" id="filterTabs" aria-label="코스 필터">
      <button class="filter-tab active" data-filter="all">전체</button>
      <button class="filter-tab" data-filter="low-fatigue">가벼운 코스</button>
      <button class="filter-tab" data-filter="many-spots">관광지 많은순</button>
      <button class="filter-tab" data-filter="favorites">즐겨찾기</button>
    </nav>
  </div>

  <!-- 결과 목록 -->
  <section class="result-list" id="resultList" aria-label="코스 목록" aria-live="polite">
    <div class="loading-overlay" id="loadingState">
      <div class="spinner" role="status" aria-label="로딩 중"></div>
      <p>맞춤 코스를 분석하고 있습니다</p>
    </div>
  </section>

  <!-- 만족도 조사는 코스 상세 페이지(course.html)로 이동. 여기는 제거. -->
  <section
    class="satisfaction-section"
    id="satisfactionBlock"
    aria-labelledby="satisfaction-heading"
    hidden
    style="display:none !important"
  >
    <h2 class="satisfaction-heading" id="satisfaction-heading">
      이 코스 추천이 도움이 되셨나요?
    </h2>
    <p class="satisfaction-subtitle">답해주시면 다음 여행자에게 더 정확한 코스를 드릴 수 있어요.</p>
    <div class="satisfaction-scale" role="radiogroup" aria-labelledby="satisfaction-heading" id="satisfactionScale">
      <button class="satisfaction-btn satisfaction-btn--low" role="radio" aria-checked="false" data-score="1" aria-label="1점 매우 불만">
        <span class="satisfaction-emoji" aria-hidden="true">😞</span>
        <span class="satisfaction-num" aria-hidden="true">1</span>
        <span class="satisfaction-label">매우 불만</span>
      </button>
      <button class="satisfaction-btn satisfaction-btn--low" role="radio" aria-checked="false" data-score="2" aria-label="2점 불만">
        <span class="satisfaction-emoji" aria-hidden="true">😕</span>
        <span class="satisfaction-num" aria-hidden="true">2</span>
        <span class="satisfaction-label">불만</span>
      </button>
      <button class="satisfaction-btn" role="radio" aria-checked="false" data-score="3" aria-label="3점 보통">
        <span class="satisfaction-emoji" aria-hidden="true">😐</span>
        <span class="satisfaction-num" aria-hidden="true">3</span>
        <span class="satisfaction-label">보통</span>
      </button>
      <button class="satisfaction-btn satisfaction-btn--high" role="radio" aria-checked="false" data-score="4" aria-label="4점 만족">
        <span class="satisfaction-emoji" aria-hidden="true">🙂</span>
        <span class="satisfaction-num" aria-hidden="true">4</span>
        <span class="satisfaction-label">만족</span>
      </button>
      <button class="satisfaction-btn satisfaction-btn--high" role="radio" aria-checked="false" data-score="5" aria-label="5점 매우 만족">
        <span class="satisfaction-emoji" aria-hidden="true">😊</span>
        <span class="satisfaction-num" aria-hidden="true">5</span>
        <span class="satisfaction-label">매우 만족</span>
      </button>
    </div>

    <!-- 낮은 만족도 사유 패널 (1-2점 시 전개) -->
    <div class="satisfaction-reason-panel" id="satisfactionReasonPanel" aria-hidden="true">
      <p class="satisfaction-reason-guide">어떤 점이 아쉬우셨나요? (복수 선택 가능)</p>
      <div class="satisfaction-reason-chips" role="group" aria-label="불만 사유 선택" id="satisfactionReasonChips">
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="접근성 정보 오류">접근성 정보 오류</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="이동 거리 과다">이동 거리가 너무 많아요</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="이동 유형 불일치">내 이동 유형과 안 맞아요</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="관광지 정보 부정확">관광지 정보가 부정확해요</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="다양성 부족">비슷한 곳만 나와요</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="일정 배분 이상">일정 배분이 이상해요</button>
      </div>
      <textarea
        class="satisfaction-textarea"
        id="satisfactionText"
        rows="3"
        maxlength="300"
        placeholder="더 나은 추천을 위해 의견을 남겨주세요 (선택)"
        aria-label="추가 의견 입력 (선택사항, 최대 300자)"
      ></textarea>
      <div class="satisfaction-char-count" aria-live="polite">
        <span id="satisfactionCharCount">0</span>/300
      </div>
    </div>

    <div class="satisfaction-actions">
      <button type="button" class="btn-primary satisfaction-submit" id="satisfactionSubmit" disabled>의견 보내기</button>
      <button type="button" class="satisfaction-skip" id="satisfactionSkip">건너뛰기</button>
    </div>

    <div class="satisfaction-done" id="satisfactionDone" hidden role="status" aria-live="polite">
      소중한 의견 감사합니다. 더 좋은 코스를 만들겠습니다.
    </div>
  </section>
</div>

<script src="/js/app.js"></script>
<script src="/js/results.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
