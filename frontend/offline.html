<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오프라인 — 무리없이 부산</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page-wrapper" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 20px">
  <div style="font-size:64px;margin-bottom:24px">📡</div>
  <h1 style="font-size:22px;font-weight:700;color:var(--gray-900);margin-bottom:12px">인터넷 연결을 확인해주세요</h1>
  <p style="color:var(--gray-500);margin-bottom:32px;line-height:1.7">오프라인 상태에서는 저장된 코스만 볼 수 있어요.<br>연결이 복구되면 자동으로 재개됩니다.</p>
  <button id="retryBtn" class="btn-primary" style="width:auto;padding:0 32px">다시 시도</button>
  <p id="offlineMsg" style="margin-top:12px;color:var(--gray-500);display:none">아직 연결 중...</p>
</div>
<script>
(function () {
  var btn = document.getElementById('retryBtn');
  var msg = document.getElementById('offlineMsg');

  function setOffline() {
    btn.disabled = true;
    msg.style.display = '';
  }
  function setOnline() {
    btn.disabled = false;
    msg.style.display = 'none';
  }

  btn.addEventListener('click', function () {
    if (navigator.onLine) {
      location.reload();
    } else {
      setOffline();
    }
  });

  window.addEventListener('online', function () { location.reload(); });
  window.addEventListener('offline', setOffline);

  if (!navigator.onLine) setOffline();
})();
</script>
</body>
</html>
